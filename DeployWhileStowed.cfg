// Allow all antennas to deploy while stowed
@PART[*]:HAS[@MODULE[ModuleDeployableAntenna]]:LAST[zzz_DeployWhileStowed]
{
    @MODULE[ModuleDeployableAntenna],*
    {
        %shieldedCanDeploy = True
    }
}

// Allow all solar panels to deploy while stowed
@PART[*]:HAS[@MODULE[ModuleDeployableSolarPanel]]:LAST[zzz_DeployWhileStowed]
{
    @MODULE[ModuleDeployableSolarPanel],*
    {
        %shieldedCanDeploy = True
    }
}

// Allow all legacy antennas (ModuleAnimateGeneric + ModuleDataTransmitter) to deploy while stowed
@PART[*]:HAS[@MODULE[ModuleAnimateGeneric],@MODULE[ModuleDataTransmitter]]:LAST[zzz_DeployWhileStowed]
{
    @MODULE[ModuleAnimateGeneric],*
    {
        %shieldedCanDeploy = True
    }
}
